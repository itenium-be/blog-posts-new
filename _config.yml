title: itenium
baseurl: "/blog"
image_base_url: https://itenium-be.github.io/blog-posts-new/assets
url: "https://itenium.be"
email: info@itenium.be

# Blog
github_data_url: https://github.com/itenium-be/blog-posts/blob/master
permalink: /:categories/:slug/

# Build settings
markdown: kramdown

sass:
  quiet_deps: true
  silence_deprecations:
    - import

kramdown:
  syntax_highlighter_opts:
    disable: true

# https://github.com/jekyll/minima
# bundle info minima
theme: minima

plugins:
  - jemoji
  - jekyll-gist
  - jekyll-avatar

jekyll_compose:
  auto_open: false
  default_front_matter:
    drafts:
      layout: post
      author: Wouter Van Schandevijl
      title: ""
      subTitle: ""
      desc: >
        only used in og:desc
      bigimg:
        url:
        prompt: " --ar 4:1"
        origin: Midjourney
      img:
        url:
        prompt: ""
        origin: Midjourney
      interesting:
        - desc: ""
          url:
      extras:
        - githubproject: https://github.com/itenium-be/
          githubtext: "Stuff that came into being during the making of this post"
        - url:
          desc: ""
        - git:
          desc: ""
      categories: "productivity | dotnet | javascript | dev-setup | design | trends | security | docker | databases | ruby"
      tags: [powershell,autohotkey,sql,angular,testing,excel,git,cheat-sheet,tutorial,windows,product,war-story,regex,debugging,meta,tech-talk,pragmatic-tips,fun,hacking,book-review,synology,mongo]
      series: series-unique-name
      package-versions:
        - package:
          version:
      last_modified_at:
      updates:
        - date:
          desc: ""

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .gitignore
  - .editorconfig
  - .claude
  - vendor
  - .bundle
  - check-separators.ps1
  - deepen-headers.ps1
